name: Release notes

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  create-release-notes:
    name: Create GitHub release notes
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "$MERGE_SHA" ]; then
            echo "Missing merge commit SHA."
            exit 1
          fi

          case "$HEAD_BRANCH" in
            release/v*)
              VERSION="${HEAD_BRANCH#release/}"
              KIND="Release"
              ;;
            release/*)
              VERSION="v${HEAD_BRANCH#release/}"
              KIND="Release"
              ;;
            hotfix/v*)
              VERSION="${HEAD_BRANCH#hotfix/}"
              KIND="Hotfix"
              ;;
            hotfix/*)
              VERSION="v${HEAD_BRANCH#hotfix/}"
              KIND="Hotfix"
              ;;
            *)
              DATE="$(date -u +'%Y.%m.%d')"
              VERSION="v${DATE}.${GITHUB_RUN_NUMBER}"
              KIND="Release"
              ;;
          esac

          TAG="$VERSION"
          TITLE="${KIND} ${VERSION}"
          NOTES="$(printf '## Included PR\n\n- #%s %s\n' "$PR_NUMBER" "$PR_TITLE")"

          gh release create "$TAG" \
            --repo "$REPOSITORY" \
            --target "$MERGE_SHA" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --generate-notes \
            --fail-on-no-commits \
            --latest
